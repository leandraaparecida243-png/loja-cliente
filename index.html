<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDSURF | STREETWEAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:      #00d4ff;
            --accent2:     #ff6b35;
            --lime:        #c8ff00;
            --dark:        #070a0d;
            --card:        #0c0f14;
            --card2:       #0a0d11;
            --border:      rgba(0,212,255,.12);
            --border-soft: rgba(255,255,255,.06);
            --text-muted:  #555b68;
            --text-mid:    #8b929e;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--dark);
            color: #e8eaf0;
            font-family: 'Barlow', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ── BG TEXTURE ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 5% 100%, rgba(200,255,0,.045) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 95% 0%, rgba(0,212,255,.04) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: repeating-linear-gradient(
                -45deg,
                transparent, transparent 30px,
                rgba(255,255,255,.011) 30px,
                rgba(255,255,255,.011) 31px
            );
            pointer-events: none; z-index: 0;
        }

        /* ══════════════════
           HEADER
        ══════════════════ */
        header {
            position: sticky; top: 0; z-index: 100;
            padding: 14px 18px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(7,10,13,.88);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-soft);
        }
        header::after {
            content: '';
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 1.5px;
            background: linear-gradient(90deg, var(--accent2) 0%, transparent 65%);
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.75rem; letter-spacing: .1em;
            color: #fff; line-height: 1;
        }
        .logo em {
            color: var(--accent);
            font-style: normal;
            text-shadow: 0 0 18px rgba(0,212,255,.45);
        }

        .cart-btn {
            position: relative;
            background: var(--card);
            border: 1.5px solid var(--border-soft);
            padding: .55rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; gap: .4rem;
            font-size: .82rem; font-weight: 600;
            color: var(--text-mid);
            transition: border-color .2s, color .2s;
        }
        .cart-btn:hover { border-color: var(--accent); color: #fff; }

        .cart-count {
            position: absolute; top: -6px; right: -6px;
            background: var(--lime); color: #000;
            font-size: .65rem; font-weight: 800;
            width: 19px; height: 19px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(200,255,0,.5);
        }

        /* ══════════════════
           HERO
        ══════════════════ */
        .hero {
            position: relative; z-index: 1;
            padding: 2.5rem 1.2rem 1.5rem;
            text-align: center;
        }

        .hero-tag {
            display: inline-flex; align-items: center; gap: .45rem;
            background: rgba(200,255,0,.07);
            border: 1px solid rgba(200,255,0,.18);
            border-radius: 4px;
            padding: .25rem .65rem;
            font-size: .62rem; font-weight: 700;
            letter-spacing: .15em; text-transform: uppercase;
            color: var(--lime);
            margin-bottom: .85rem;
        }
        .hero-tag .dot {
            width: 5px; height: 5px;
            background: var(--lime); border-radius: 50%;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .hero h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.6rem, 11vw, 4rem);
            letter-spacing: .05em; line-height: .95;
            margin-bottom: .7rem;
            color: #fff;
        }
        .hero h2 em { color: var(--accent); font-style: normal; }

        .hero p {
            color: var(--text-muted);
            font-size: .82rem; font-weight: 500;
            max-width: 260px; margin: 0 auto;
            line-height: 1.6;
        }

        /* ══════════════════
           CATEGORIES
        ══════════════════ */
        .categories {
            display: flex; gap: 8px;
            padding: 1rem 1.2rem;
            overflow-x: auto; scrollbar-width: none;
            position: relative; z-index: 1;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: .55rem 1.1rem;
            background: var(--card2);
            border: 1.5px solid var(--border-soft);
            border-radius: 8px;
            white-space: nowrap;
            color: var(--text-muted);
            font-family: 'Barlow', sans-serif;
            font-size: .75rem; font-weight: 700;
            letter-spacing: .06em; text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
        }
        .cat-btn:hover { color: #fff; border-color: rgba(255,255,255,.15); }
        .cat-btn.active {
            background: var(--accent); color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(0,212,255,.25);
        }

        /* ══════════════════
           PRODUCTS GRID
        ══════════════════ */
        .products-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; padding: 0 1.2rem 7rem;
            position: relative; z-index: 1;
        }

        .product-card {
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: 16px; padding: 10px;
            position: relative;
            transition: border-color .25s, transform .2s;
            animation: fadeUp .5s ease backwards;
        }
        .product-card:hover { border-color: rgba(0,212,255,.2); transform: translateY(-2px); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .product-img {
            width: 100%; aspect-ratio: 1; object-fit: cover;
            border-radius: 10px; margin-bottom: 10px;
            background: #0a0d11;
        }

        .product-info h3 {
            font-size: .82rem; font-weight: 600;
            color: #d8dae0; margin-bottom: 3px;
            line-height: 1.3;
        }
        .product-info .price {
            color: var(--accent);
            font-weight: 800; font-size: .95rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: .04em;
        }

        .add-btn {
            width: 100%; margin-top: 10px;
            background: var(--lime); color: #000;
            border: none; padding: .65rem;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: .95rem; letter-spacing: .08em;
            cursor: pointer;
            transition: opacity .2s, box-shadow .2s;
        }
        .add-btn:hover { opacity: .88; box-shadow: 0 4px 14px rgba(200,255,0,.28); }
        .add-btn:active { transform: scale(.96); }

        /* ══════════════════
           MODAL TAMANHO
        ══════════════════ */
        #size-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.92);
            display: none; align-items: flex-end; justify-content: center;
            z-index: 300;
            backdrop-filter: blur(12px);
        }

        .size-box {
            background: var(--card);
            padding: 2rem 1.4rem 2.5rem;
            border-radius: 22px 22px 0 0;
            width: 100%; max-width: 480px;
            border-top: 1px solid var(--border-soft);
            animation: slideUp .35s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .size-box-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,.12);
            border-radius: 2px;
            margin: 0 auto 1.2rem;
        }

        .size-box h3 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: .1em; font-size: 1.4rem;
            color: #fff; margin-bottom: .3rem;
            text-align: center;
        }
        .size-box-sub {
            font-size: .7rem; font-weight: 600;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--text-muted); text-align: center;
            margin-bottom: 1.2rem;
        }

        .size-options {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; margin-bottom: 1.4rem;
        }
        .size-opt {
            padding: .75rem;
            border: 1.5px solid var(--border-soft);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700; font-size: .85rem;
            text-align: center;
            color: var(--text-mid);
            transition: all .2s;
        }
        .size-opt:hover { border-color: rgba(0,212,255,.3); color: #fff; }
        .size-opt.active {
            background: var(--lime); color: #000;
            border-color: var(--lime);
        }

        .size-confirm-btn {
            width: 100%; padding: .9rem;
            background: var(--accent); color: #000;
            border: none; border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem; letter-spacing: .08em;
            cursor: pointer;
            transition: box-shadow .2s, opacity .2s;
        }
        .size-confirm-btn:hover { box-shadow: 0 4px 20px rgba(0,212,255,.3); }

        .size-cancel-btn {
            width: 100%; margin-top: .65rem;
            background: none; border: none;
            color: var(--text-muted);
            font-family: 'Barlow', sans-serif;
            font-size: .78rem; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            cursor: pointer;
            transition: color .2s;
        }
        .size-cancel-btn:hover { color: #fff; }

        /* ══════════════════
           CARRINHO
        ══════════════════ */
        .cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.82);
            backdrop-filter: blur(10px);
            z-index: 200;
            visibility: hidden; opacity: 0;
            transition: opacity .3s, visibility .3s;
        }
        .cart-overlay.active { visibility: visible; opacity: 1; }

        .cart-modal {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #090c10;
            border-top: 1px solid var(--border-soft);
            border-radius: 24px 24px 0 0;
            padding: 1.5rem 1.2rem 2rem;
            max-height: 92vh; overflow-y: auto;
            transform: translateY(100%);
            transition: transform .4s cubic-bezier(.4,0,.2,1);
        }
        .cart-overlay.active .cart-modal { transform: translateY(0); }

        .cart-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,.1);
            border-radius: 2px;
            margin: 0 auto 1.2rem;
        }

        .cart-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.4rem;
        }
        .cart-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: .1em; font-size: 1.5rem;
            color: #fff;
        }
        .close-cart {
            background: rgba(255,255,255,.06);
            border: 1px solid var(--border-soft);
            color: var(--text-muted);
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; cursor: pointer;
            transition: color .2s, border-color .2s;
        }
        .close-cart:hover { color: #fff; border-color: rgba(255,255,255,.2); }

        .cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.4rem; }

        .cart-item {
            display: flex; gap: 12px; align-items: center;
            background: var(--card2);
            padding: 10px; border-radius: 12px;
            border: 1px solid var(--border-soft);
        }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }

        .item-details { flex: 1; }
        .item-details h4 { font-size: .82rem; font-weight: 600; margin-bottom: 2px; color: #d8dae0; }
        .item-details p { color: var(--accent); font-weight: 800; font-size: .82rem; }
        .item-details span {
            font-size: .65rem; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--text-muted);
        }

        .quantity-controls {
            display: flex; align-items: center; gap: 10px;
            background: #0d1017; padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
        }
        .quantity-controls button {
            background: none; border: none;
            color: var(--text-mid); font-size: 1rem;
            cursor: pointer; padding: 0 3px;
            transition: color .2s;
        }
        .quantity-controls button:hover { color: #fff; }
        .quantity-controls span { font-weight: 800; font-size: .82rem; min-width: 14px; text-align: center; }

        /* checkout */
        .checkout-section {
            border-top: 1px solid var(--border-soft);
            padding-top: 1.4rem; margin-top: 1rem;
        }
        .total-box {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 1.4rem;
        }
        .total-label {
            font-size: .65rem; font-weight: 700;
            letter-spacing: .14em; text-transform: uppercase;
            color: var(--text-muted);
        }
        .total-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.7rem; letter-spacing: .04em;
            color: var(--lime);
        }

        .checkout-form { display: flex; flex-direction: column; gap: 9px; }

        .checkout-form input,
        .checkout-form select {
            background: var(--card2);
            border: 1.5px solid var(--border-soft);
            padding: .78rem 1rem;
            border-radius: 10px;
            color: #e8eaf0;
            font-family: 'Barlow', sans-serif;
            font-size: .85rem; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .checkout-form input::placeholder { color: #2a2e38; }
        .checkout-form input:focus,
        .checkout-form select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,212,255,.08);
        }
        .checkout-form select option { background: #0d1117; }

        .finish-btn {
            width: 100%; margin-top: .4rem;
            background: var(--accent); color: #000;
            border: none; padding: 1rem;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem; letter-spacing: .08em;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(0,212,255,.25);
            transition: opacity .2s, box-shadow .2s;
        }
        .finish-btn:hover { opacity: .9; box-shadow: 0 10px 32px rgba(0,212,255,.35); }

        /* ══════════════════
           TAB BAR
        ══════════════════ */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(9,12,16,.96);
            backdrop-filter: blur(16px);
            display: flex; justify-content: space-around;
            padding: .9rem .5rem;
            border-top: 1px solid var(--border-soft);
            z-index: 150;
        }

        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            color: var(--text-muted);
            font-size: .6rem; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            cursor: pointer;
            transition: color .2s;
            padding: 0 .8rem;
        }
        .tab-item i { font-size: 1.1rem; font-style: normal; }
        .tab-item.active { color: var(--accent); }
        .tab-item:hover { color: var(--text-mid); }

        /* ══════════════════
           TOAST
        ══════════════════ */
        .toast {
            position: fixed; top: 72px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--lime); color: #000;
            padding: .65rem 1.4rem;
            border-radius: 8px;
            font-family: 'Barlow', sans-serif;
            font-weight: 700; font-size: .78rem;
            letter-spacing: .06em;
            z-index: 1000;
            transition: transform .45s cubic-bezier(.68,-.55,.265,1.55);
            box-shadow: 0 8px 24px rgba(200,255,0,.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ══════════════════
           LOADING
        ══════════════════ */
        .loading {
            grid-column: 1 / -1; text-align: center;
            padding: 3.5rem; color: var(--text-muted);
            font-size: .82rem; font-weight: 500;
            letter-spacing: .06em;
        }
        .loading span {
            display: block; font-size: 2rem;
            margin-bottom: .75rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* pulse anim */
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: .4; transform: scale(.7); }
        }
    </style>
</head>
<body>

<div class="toast" id="toast">✅ Adicionado ao carrinho!</div>

<!-- ══ HEADER ══ -->
<header>
    <div class="logo">MD<em>SURF</em></div>
    <div class="cart-btn" onclick="toggleCart()">
        🛒 Carrinho
        <span class="cart-count" id="cart-count">0</span>
    </div>
</header>

<!-- ══ HERO ══ -->
<section class="hero">
    <div class="hero-tag"><span class="dot"></span> Nova Coleção</div>
    <h2>NEW<br><em>COLLECTION</em></h2>
    <p>A essência do surf e do streetwear em cada detalhe.</p>
</section>

<!-- ══ CATEGORIAS ══ -->
<div class="categories" id="categories">
    <button class="cat-btn active" onclick="filterCategory('todos', this)">🔥 Todos</button>
    <button class="cat-btn" onclick="filterCategory('camisetas', this)">👕 Camisetas</button>
    <button class="cat-btn" onclick="filterCategory('hoodies', this)">🧥 Hoodies</button>
    <button class="cat-btn" onclick="filterCategory('shorts', this)">🩳 Shorts</button>
    <button class="cat-btn" onclick="filterCategory('acessórios', this)">💎 Acessórios</button>
</div>

<!-- ══ GRID PRODUTOS ══ -->
<div class="products-grid" id="products-grid">
    <div class="loading"><span>⟳</span>Carregando produtos...</div>
</div>

<!-- ══ MODAL TAMANHO ══ -->
<div id="size-modal">
    <div class="size-box">
        <div class="size-box-handle"></div>
        <h3>ESCOLHA O TAMANHO</h3>
        <div class="size-box-sub">Selecione antes de adicionar</div>
        <div class="size-options" id="size-options"></div>
        <button class="size-confirm-btn" onclick="confirmarTamanho()">ADICIONAR AO CARRINHO</button>
        <button class="size-cancel-btn" onclick="fecharModalTamanho()">CANCELAR</button>
    </div>
</div>

<!-- ══ CARRINHO ══ -->
<div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this) toggleCart()">
    <div class="cart-modal">
        <div class="cart-handle"></div>
        <div class="cart-header">
            <h2>SEU CARRINHO</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="checkout-section">
            <div class="total-box">
                <span class="total-label">Total do pedido</span>
                <span class="total-value" id="cart-total">R$ 0,00</span>
            </div>
            <div class="checkout-form">
                <input type="text"  id="checkout-nome"      placeholder="Nome Completo">
                <input type="tel"   id="checkout-whatsapp"  placeholder="WhatsApp com DDD">
                <input type="text"  id="checkout-endereco"  placeholder="Endereço Completo">
                <input type="text"  id="checkout-cep"       placeholder="CEP">
                <select id="checkout-pagamento">
                    <option value="PIX">💠 PIX (Aprovação Imediata)</option>
                    <option value="Cartão">💳 Cartão de Crédito</option>
                    <option value="Dinheiro">💵 Dinheiro na Entrega</option>
                </select>
                <button class="finish-btn" onclick="finalizarCompra()">🚀 FINALIZAR PEDIDO NO WHATSAPP</button>
            </div>
        </div>
    </div>
</div>

<!-- ══ TAB BAR ══ -->
<div class="tab-bar">
    <div class="tab-item active"><i>🏠</i><span>Home</span></div>
    <div class="tab-item" onclick="toggleCart()"><i>🛍️</i><span>Loja</span></div>
    <div class="tab-item"><i>🔍</i><span>Busca</span></div>
    <div class="tab-item"><i>👤</i><span>Perfil</span></div>
</div>

<script>
    // ✅ Detecta IP automaticamente para não quebrar se o IP mudar
    const API_URL = `http://${window.location.hostname}:8080/produtos.php`;

    let produtos = [];

    async function carregarProdutosDoBanco() {
        try {
            const resposta = await fetch(API_URL);
            if (!resposta.ok) throw new Error("Erro na rede");
            const dados = await resposta.json();
            if (!Array.isArray(dados)) throw new Error("Resposta inválida");
            produtos = dados;
            renderizarProdutos(produtos);
        } catch (erro) {
            console.error("Erro ao carregar produtos:", erro);
            document.getElementById('products-grid').innerHTML =
                '<p style="grid-column:1/-1;text-align:center;padding:3rem;color:#ff4444;font-size:.82rem;">⚠️ Erro ao carregar produtos.<br><span style="color:var(--text-muted);font-size:.72rem;">Verifique se o servidor está rodando.</span></p>';
        }
    }

    function renderizarProdutos(lista) {
        const grid = document.getElementById('products-grid');
        if (!lista || lista.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);font-size:.82rem;">Nenhum produto no estoque.</p>';
            return;
        }
        grid.innerHTML = lista.map((p, i) => `
            <div class="product-card" style="animation-delay:${i * 0.07}s">
                <img src="${p.foto || 'https://via.placeholder.com/300'}" class="product-img" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/300'">
                <div class="product-info">
                    <h3>${p.nome}</h3>
                    <div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                </div>
                <button class="add-btn" onclick="abrirModalTamanho(${p.id})">COMPRAR</button>
            </div>
        `).join('');
    }

    let carrinho = [];
    let produtoSelecionado = null;
    let tamanhoSelecionado = null;

    function filterCategory(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (cat === 'todos') { renderizarProdutos(produtos); }
        else { renderizarProdutos(produtos.filter(p => p.categoria && p.categoria.toLowerCase() === cat.toLowerCase())); }
    }

    function abrirModalTamanho(id) {
        produtoSelecionado = produtos.find(p => p.id == id);
        const modal   = document.getElementById('size-modal');
        const options = document.getElementById('size-options');
        let tamanhos  = produtoSelecionado.tamanhos || 'P,M,G,GG';
        if (typeof tamanhos === 'string') tamanhos = tamanhos.split(',');
        tamanhos = tamanhos.map(t => t.trim()).filter(t => t !== '');
        if (tamanhos.length === 0) tamanhos = ['P', 'M', 'G', 'GG'];
        options.innerHTML = tamanhos.map(t =>
            `<div class="size-opt" onclick="selecionarTamanho('${t}', this)">${t}</div>`
        ).join('');
        modal.style.display = 'flex';
        tamanhoSelecionado = null;
    }

    function selecionarTamanho(tam, el) {
        document.querySelectorAll('.size-opt').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        tamanhoSelecionado = tam;
    }

    function fecharModalTamanho() { document.getElementById('size-modal').style.display = 'none'; }

    function confirmarTamanho() {
        if (!tamanhoSelecionado) { alert('Selecione um tamanho!'); return; }
        adicionarAoCarrinho(produtoSelecionado, tamanhoSelecionado);
        fecharModalTamanho();
        showToast();
        toggleCart();
    }

    function adicionarAoCarrinho(prod, tam) {
        const existente = carrinho.find(i => i.id == prod.id && i.tamanho === tam);
        if (existente) { existente.quantidade++; }
        else { carrinho.push({ ...prod, tamanho: tam, quantidade: 1 }); }
        atualizarCarrinho();
    }

    function atualizarCarrinho() {
        const container = document.getElementById('cart-items');
        const count     = document.getElementById('cart-count');
        const total     = document.getElementById('cart-total');
        let totalGeral  = 0; let totalItens = 0;

        if (carrinho.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:2rem 0;color:var(--text-muted);font-size:.82rem;">Seu carrinho está vazio.</p>';
        } else {
            container.innerHTML = carrinho.map((item, index) => {
                totalGeral += parseFloat(item.preco) * item.quantidade;
                totalItens += item.quantidade;
                return `
                <div class="cart-item">
                    <img src="${item.foto || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                    <div class="item-details">
                        <h4>${item.nome}</h4>
                        <p>R$ ${parseFloat(item.preco).toFixed(2)}</p>
                        <span>TAM: ${item.tamanho}</span>
                    </div>
                    <div class="quantity-controls">
                        <button onclick="mudarQtd(${index}, -1)">−</button>
                        <span>${item.quantidade}</span>
                        <button onclick="mudarQtd(${index}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');
        }

        // recalcula totais
        carrinho.forEach(i => { totalGeral += 0; }); // já calculado no map acima
        totalGeral = carrinho.reduce((acc, i) => acc + parseFloat(i.preco) * i.quantidade, 0);
        totalItens = carrinho.reduce((acc, i) => acc + i.quantidade, 0);

        count.textContent = totalItens;
        total.textContent = `R$ ${totalGeral.toFixed(2)}`;
    }

    function mudarQtd(index, delta) {
        carrinho[index].quantidade += delta;
        if (carrinho[index].quantidade <= 0) { carrinho.splice(index, 1); }
        atualizarCarrinho();
    }

    function toggleCart() { document.getElementById('cart-overlay').classList.toggle('active'); }

    function finalizarCompra() {
        if (carrinho.length === 0) { alert('Seu carrinho está vazio!'); return; }
        const nome      = document.getElementById('checkout-nome').value.trim();
        const whatsapp  = document.getElementById('checkout-whatsapp').value.trim();
        const endereco  = document.getElementById('checkout-endereco').value.trim();
        const cep       = document.getElementById('checkout-cep').value.trim();
        const pagamento = document.getElementById('checkout-pagamento').value;
        if (!nome || !whatsapp) { alert("Preencha nome e WhatsApp!"); return; }

        const resumo = carrinho.map(item =>
            `• ${item.quantidade}x ${item.nome} (Tam: ${item.tamanho}) - R$ ${parseFloat(item.preco).toFixed(2)}`
        ).join('\n');
        const total = carrinho.reduce((acc, item) => acc + parseFloat(item.preco) * item.quantidade, 0);

        const mensagem =
            `🛍 *NOVO PEDIDO - MDSURF*\n\n` +
            `👤 *Cliente:* ${nome}\n` +
            `📱 *WhatsApp:* ${whatsapp}\n` +
            `📍 *Endereço:* ${endereco}\n` +
            `📮 *CEP:* ${cep}\n` +
            `💳 *Pagamento:* ${pagamento}\n\n` +
            `📦 *Produtos:*\n${resumo}\n\n` +
            `💰 *Total: R$ ${total.toFixed(2)}*`;

        const numero = '5516981928132';
        const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
        window.open(url, '_blank');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    carregarProdutosDoBanco();
</script>
</body>
</html>
