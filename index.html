<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDSURF | STREETWEAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent:      #00d4ff;
            --accent2:     #ff6b35;
            --lime:        #c8ff00;
            --dark:        #070a0d;
            --card:        #0c0f14;
            --card2:       #0a0d11;
            --border:      rgba(0,212,255,.12);
            --border-soft: rgba(255,255,255,.06);
            --text-muted:  #555b68;
            --text-mid:    #8b929e;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--dark);
            color: #e8eaf0;
            font-family: 'Barlow', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 5% 100%, rgba(200,255,0,.045) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 95% 0%, rgba(0,212,255,.04) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(255,255,255,.011) 30px, rgba(255,255,255,.011) 31px);
            pointer-events: none; z-index: 0;
        }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 100;
            padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(7,10,13,.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-soft);
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem; letter-spacing: .1em; color: #fff; }
        .logo em { color: var(--accent); font-style: normal; }

        .cart-btn {
            position: relative; background: var(--card); border: 1.5px solid var(--border-soft);
            padding: .55rem 1rem; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; gap: .4rem; font-size: .82rem; font-weight: 600; color: var(--text-mid);
        }
        .cart-count {
            position: absolute; top: -6px; right: -6px; background: var(--lime); color: #000;
            font-size: .65rem; font-weight: 800; width: 19px; height: 19px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        /* HERO */
        .hero { position: relative; z-index: 1; padding: 2.5rem 1.2rem 1.5rem; text-align: center; }
        .hero h2 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: .05em; line-height: .95; color: #fff; }
        .hero h2 em { color: var(--accent); font-style: normal; }
        .hero p { color: var(--text-muted); font-size: .82rem; margin-top: 10px; }

        /* CATEGORIES */
        .categories { display: flex; gap: 8px; padding: 1rem 1.2rem; overflow-x: auto; scrollbar-width: none; position: relative; z-index: 1; }
        .cat-btn {
            padding: .55rem 1.1rem; background: var(--card2); border: 1.5px solid var(--border-soft);
            border-radius: 8px; white-space: nowrap; color: var(--text-muted); font-size: .75rem; font-weight: 700; cursor: pointer;
        }
        .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* PRODUCTS GRID */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 1.2rem 7rem; position: relative; z-index: 1; }
        .product-card { background: var(--card); border: 1px solid var(--border-soft); border-radius: 16px; padding: 10px; position: relative; }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #0a0d11; }
        .product-info h3 { font-size: .82rem; font-weight: 600; color: #d8dae0; margin-bottom: 3px; }
        .product-info .price { color: var(--accent); font-weight: 800; font-size: .95rem; font-family: 'Bebas Neue', sans-serif; }
        .add-btn { width: 100%; margin-top: 10px; background: var(--lime); color: #000; border: none; padding: .65rem; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; cursor: pointer; }

        /* LOADING SKELETON */
        .loading-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 3rem 0; }
        .spinner-loja { width: 28px; height: 28px; border: 3px solid rgba(0,212,255,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
        .loading-state p { color: var(--text-muted); font-size: .78rem; font-weight: 600; letter-spacing: .1em; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAL TAMANHO */
        #size-modal { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: none; align-items: flex-end; justify-content: center; z-index: 300; backdrop-filter: blur(12px); }
        .size-box { background: var(--card); padding: 2rem 1.4rem 2.5rem; border-radius: 22px 22px 0 0; width: 100%; max-width: 480px; border-top: 1px solid var(--border-soft); }
        .size-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 1.2rem 0; }
        .size-opt { padding: .75rem; border: 1.5px solid var(--border-soft); border-radius: 8px; cursor: pointer; font-weight: 700; text-align: center; color: var(--text-mid); }
        .size-opt.active { background: var(--lime); color: #000; border-color: var(--lime); }
        .size-confirm-btn { width: 100%; padding: .9rem; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; cursor: pointer; }

        /* CARRINHO */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.82); backdrop-filter: blur(10px); z-index: 200; visibility: hidden; opacity: 0; transition: 0.3s; }
        .cart-overlay.active { visibility: visible; opacity: 1; }
        .cart-modal { position: fixed; bottom: 0; left: 0; right: 0; background: #090c10; border-top: 1px solid var(--border-soft); border-radius: 24px 24px 0 0; padding: 1.5rem 1.2rem 2rem; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: 0.4s; }
        .cart-overlay.active .cart-modal { transform: translateY(0); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.4rem; }
        .cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.4rem; }
        .cart-item { display: flex; gap: 12px; align-items: center; background: var(--card2); padding: 10px; border-radius: 12px; }
        .cart-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #0a0d11; }
        .checkout-form input, .checkout-form select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #222; border-radius: 8px; color: #fff; margin-bottom: 8px; font-family: inherit; }
        .finish-btn { width: 100%; padding: 1rem; background: #25d366; color: #fff; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; cursor: pointer; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--lime); color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 700; z-index: 1000; transition: 0.4s; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .erro-estado { grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-muted); font-size: .82rem; }
        .erro-estado button { margin-top: 12px; background: var(--accent); color: #000; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="toast" id="toast">✅ Adicionado ao carrinho!</div>

<header>
    <div class="logo">MD<em>SURF</em></div>
    <div class="cart-btn" onclick="toggleCart()">
        🛒 Carrinho
        <span class="cart-count" id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h2>NEW <em>COLLECTION</em></h2>
    <p>A essência do surf e do streetwear em cada detalhe.</p>
</section>

<div class="categories" id="categories">
    <button class="cat-btn active" onclick="filterCategory('todos', this)">🔥 Todos</button>
    <button class="cat-btn" onclick="filterCategory('camisetas', this)">👕 Camisetas</button>
    <button class="cat-btn" onclick="filterCategory('hoodies', this)">🧥 Blusas</button>
    <button class="cat-btn" onclick="filterCategory('jaquetas', this)">🥼 Jaquetas</button>
    <button class="cat-btn" onclick="filterCategory('calças', this)">👖 Calças</button>
    <button class="cat-btn" onclick="filterCategory('shorts', this)">🩳 Shorts</button>
    <button class="cat-btn" onclick="filterCategory('cuecas', this)">🩲 Cuecas</button>
    <button class="cat-btn" onclick="filterCategory('meias', this)">🧦 Meias</button>
    <button class="cat-btn" onclick="filterCategory('tênis', this)">👟 Tênis</button>
    <button class="cat-btn" onclick="filterCategory('bonés', this)">🧢 Bonés</button>
    <button class="cat-btn" onclick="filterCategory('relógios', this)">⌚ Relógios</button>
    <button class="cat-btn" onclick="filterCategory('óculos', this)">🕶️ Óculos</button>
    <button class="cat-btn" onclick="filterCategory('perfumes', this)">🌊 Perfumes</button>
</div>

<div class="products-grid" id="products-grid">
    <div class="loading-state">
        <div class="spinner-loja"></div>
        <p>CARREGANDO PRODUTOS...</p>
    </div>
</div>

<div id="size-modal">
    <div class="size-box">
        <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;">ESCOLHA O TAMANHO</h3>
        <div class="size-options" id="size-options"></div>
        <button class="size-confirm-btn" onclick="confirmarTamanho()">ADICIONAR AO CARRINHO</button>
        <button style="width:100%; background:none; border:none; color:#888; margin-top:10px; cursor:pointer; font-family:'Barlow',sans-serif;" onclick="fecharModalTamanho()">CANCELAR</button>
    </div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this) toggleCart()">
    <div class="cart-modal">
        <div class="cart-header">
            <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em;">SEU CARRINHO</h2>
            <button style="background:#222; border:none; color:#fff; width:30px; height:30px; border-radius:50%; cursor:pointer;" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="checkout-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold;">
                <span>Total</span>
                <span id="cart-total" style="color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;">R$ 0,00</span>
            </div>
            <div class="checkout-form">
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="tel" id="c-whatsapp" placeholder="WhatsApp com DDD">
                <input type="text" id="c-endereco" placeholder="Endereço de Entrega">
                <select id="c-pagamento">
                    <option value="PIX">💠 PIX</option>
                    <option value="Cartão">💳 Cartão de Crédito</option>
                    <option value="Dinheiro">💵 Dinheiro na Entrega</option>
                </select>
                <button class="finish-btn" onclick="finalizarCompra()">🚀 FINALIZAR NO WHATSAPP</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ── CONFIG (igual ao admin) ──
    const BIN_ID       = '6a187891ddf5aa59f770c17c';
    const BIN_FOTOS_ID = '6a1b939021f9ee59d29fa7e3';
    const API_KEY      = '$2a$10$bD7LDT0NM41fX03433GmPOb4pfAWxTsOJm7Od2RVXg/mIdEKzRfmK';

    let produtos = [];
    let fotosCache = {};
    let carrinho = [];
    let produtoSelecionado = null;
    let tamanhoSelecionado = null;

    // ── CARREGAR DADOS ──
    async function carregarDados() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = `<div class="loading-state"><div class="spinner-loja"></div><p>CARREGANDO PRODUTOS...</p></div>`;
        try {
            // 1) Carrega fotos
            const rFotos = await fetch(`https://api.jsonbin.io/v3/b/${BIN_FOTOS_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            if (!rFotos.ok) throw new Error('Erro fotos');
            const dFotos = await rFotos.json();
            fotosCache = (dFotos.record && dFotos.record.fotos) ? dFotos.record.fotos : {};

            // 2) Carrega produtos
            const rProds = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            if (!rProds.ok) throw new Error('Erro produtos');
            const dProds = await rProds.json();
            produtos = Array.isArray(dProds.record) ? dProds.record : [];
            // Filtra placeholders e produtos sem nome
            produtos = produtos.filter(p => p.nome && p.nome.trim() !== '');

            renderizarProdutos(produtos);
        } catch(e) {
            console.error(e);
            grid.innerHTML = `
                <div class="erro-estado">
                    <p>⚠️ Não foi possível carregar os produtos.<br>Verifique sua conexão.</p>
                    <button onclick="carregarDados()">TENTAR NOVAMENTE</button>
                </div>`;
        }
    }

    // ── RESOLVER URL DA FOTO ──
    function getFotoUrl(p) {
        if (!p.foto) return '';
        if (p.foto.startsWith('BIN_FOTO:')) {
            const id = p.foto.replace('BIN_FOTO:', '');
            return fotosCache[id] || '';
        }
        return p.foto; // URL direta
    }

    // ── RENDERIZAR PRODUTOS ──
    function renderizarProdutos(lista) {
        const grid = document.getElementById('products-grid');
        if (lista.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:3rem 0;font-size:.82rem;">Nenhum produto encontrado.</p>';
            return;
        }
        grid.innerHTML = lista.map(p => {
            const foto = getFotoUrl(p);
            return `
            <div class="product-card">
                <img src="${foto}" class="product-img" alt="${p.nome}"
                    onerror="this.style.background='#0a0d11'; this.removeAttribute('src')">
                <div class="product-info">
                    <h3>${p.nome}</h3>
                    <div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                </div>
                <button class="add-btn" onclick="abrirModalTamanho(${p.id})">COMPRAR</button>
            </div>`;
        }).join('');
    }

    // ── FILTRO DE CATEGORIA ──
    function filterCategory(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (cat === 'todos') renderizarProdutos(produtos);
        else renderizarProdutos(produtos.filter(p => p.categoria && p.categoria.toLowerCase() === cat.toLowerCase()));
    }

    // ── MODAL TAMANHO ──
    function abrirModalTamanho(id) {
        produtoSelecionado = produtos.find(p => p.id == id);
        if (!produtoSelecionado) return;
        const options = document.getElementById('size-options');
        let tamanhos = produtoSelecionado.tamanhos || ['P', 'M', 'G', 'GG'];
        if (typeof tamanhos === 'string') tamanhos = tamanhos.split(',').map(t => t.trim());
        options.innerHTML = tamanhos.map(t => `<div class="size-opt" onclick="selecionarTamanho('${t}', this)">${t}</div>`).join('');
        document.getElementById('size-modal').style.display = 'flex';
        tamanhoSelecionado = null;
    }

    function selecionarTamanho(tam, el) {
        document.querySelectorAll('.size-opt').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        tamanhoSelecionado = tam;
    }

    function fecharModalTamanho() { document.getElementById('size-modal').style.display = 'none'; }

    function confirmarTamanho() {
        if (!tamanhoSelecionado) { alert('Selecione um tamanho!'); return; }
        adicionarAoCarrinho(produtoSelecionado, tamanhoSelecionado);
        fecharModalTamanho();
        showToast();
    }

    // ── CARRINHO ──
    function adicionarAoCarrinho(prod, tam) {
        const item = carrinho.find(i => i.id == prod.id && i.tamanho === tam);
        if (item) item.quantidade++;
        else carrinho.push({ ...prod, tamanho: tam, quantidade: 1 });
        atualizarCarrinho();
    }

    function atualizarCarrinho() {
        const container = document.getElementById('cart-items');
        const count     = document.getElementById('cart-count');
        const total     = document.getElementById('cart-total');
        let soma = 0, itens = 0;

        container.innerHTML = carrinho.map((item, idx) => {
            soma  += item.preco * item.quantidade;
            itens += item.quantidade;
            const foto = getFotoUrl(item);
            return `
            <div class="cart-item">
                ${foto ? `<img src="${foto}" alt="${item.nome}">` : `<div style="width:50px;height:50px;background:#0a0d11;border-radius:8px;"></div>`}
                <div style="flex:1">
                    <h4 style="font-size:0.8rem">${item.nome}</h4>
                    <p style="color:var(--accent);font-size:0.8rem">R$ ${item.preco.toFixed(2)} · Tam: ${item.tamanho}</p>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <button onclick="mudarQtd(${idx}, -1)" style="background:#222;border:none;color:#fff;width:24px;height:24px;border-radius:4px;cursor:pointer;">-</button>
                    <span style="min-width:16px;text-align:center;">${item.quantidade}</span>
                    <button onclick="mudarQtd(${idx}, 1)" style="background:#222;border:none;color:#fff;width:24px;height:24px;border-radius:4px;cursor:pointer;">+</button>
                </div>
            </div>`;
        }).join('');

        if (carrinho.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;font-size:.82rem;">Carrinho vazio</p>';
        }

        count.textContent = itens;
        total.textContent = `R$ ${soma.toFixed(2).replace('.', ',')}`;
    }

    function mudarQtd(idx, delta) {
        carrinho[idx].quantidade += delta;
        if (carrinho[idx].quantidade <= 0) carrinho.splice(idx, 1);
        atualizarCarrinho();
    }

    function toggleCart() { document.getElementById('cart-overlay').classList.toggle('active'); }

    // ── FINALIZAR COMPRA ──
    function finalizarCompra() {
        if (carrinho.length === 0) { alert('Carrinho vazio!'); return; }
        const nome      = document.getElementById('c-nome').value.trim();
        const whatsapp  = document.getElementById('c-whatsapp').value.trim();
        const endereco  = document.getElementById('c-endereco').value.trim();
        const pagamento = document.getElementById('c-pagamento').value;

        if (!nome || !whatsapp || !endereco) { alert('Preencha todos os campos!'); return; }

        const resumo = carrinho.map(i => `• ${i.quantidade}x ${i.nome} (Tam: ${i.tamanho})`).join('\n');
        const total  = document.getElementById('cart-total').textContent;

        const msg = `🛍 *NOVO PEDIDO - MDSURF*\n\n👤 *Cliente:* ${nome}\n📱 *WhatsApp:* ${whatsapp}\n📍 *Endereço:* ${endereco}\n💳 *Pagamento:* ${pagamento}\n\n📦 *Produtos:*\n${resumo}\n\n💰 *Total: ${total}*`;
        const fone = '5516981928132';
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── INIT ──
    carregarDados();
</script>
</body>
</html>
